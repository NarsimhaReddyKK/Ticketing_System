name: Deployment Events to KeepHQ

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Send Deployment Started
        run: |
          curl -X POST "https://d262zqlbf1m6r4.cloudfront.net/api/backend/alerts/event" \
          -H "Content-Type: application/json" \
          -H "X-API-KEY: ${{ secrets.KEEP_API_KEY }}" \
          -d '{
            "id": "${{ github.run_id }}",
            "name": "Deployment Started",
            "status": "started",
            "environment": "dev",
            "service": "wise-ai-build",
            "source": ["github"],
            "message": "Deployment started",
            "severity": "info",
            "labels": {
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit_sha": "${{ github.sha }}",
              "deployer": "${{ github.actor }}"
            },
            "fingerprint": "deploy-${{ github.run_id }}"
          }'

      - name: Deploy Application
        run: |
          echo "Deploying application..."
          sleep 10

      - name: Send Deployment Finished
        run: |
          curl -X POST "https://d262zqlbf1m6r4.cloudfront.net/api/backend/alerts/event" \
          -H "Content-Type: application/json" \
          -H "X-API-KEY: ${{ secrets.KEEP_API_KEY }}" \
          -d '{
            "id": "${{ github.run_id }}",
            "name": "Deployment Finished",
            "status": "completed",
            "environment": "dev",
            "service": "wise-ai-build",
            "source": ["github"],
            "message": "Deployment finished",
            "severity": "info",
            "labels": {
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}"
            },
            "fingerprint": "deploy-${{ github.run_id }}"
          }'