name: Notify KeepHQ on Push

on:
  push:
    branches:
      - main
      - master

jobs:
  notify-keep:
    runs-on: ubuntu-latest

    steps:
      - name: Send push alert to KeepHQ
        run: |
          curl -X POST https://d262zqlbf1m6r4.cloudfront.net/api/alerts/event \
          -H "Content-Type: application/json" \
          -H "X-API-KEY: ${{ secrets.KEEP_API_KEY }}" \
          -d "{
            \"id\": \"push-${{ github.run_id }}\",
            \"name\": \"GitHub Push Event\",
            \"status\": \"firing\",
            \"source\": [\"github\"],
            \"severity\": \"info\",
            \"message\": \"New push to repository ${{ github.repository }} by ${{ github.actor }}\"
          }"