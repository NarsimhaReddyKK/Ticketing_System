name: Send Alert to KeepHQ

on:
  push:
    branches:
      - main
      - master

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Send alert to KeepHQ
        run: |
          curl -X POST "https://d262zqlbf1m6r4.cloudfront.net/api/backend/alerts/event" \
          -H "Content-Type: application/json" \
          -H "X-API-KEY: ${{ secrets.KEEP_API_KEY }}" \
          -d '{
            "id": "push-${{ github.run_id }}",
            "name": "GitHub Push Event",
            "status": "firing",
            "lastReceived": "${{ github.event.head_commit.timestamp }}",
            "environment": "production",
            "service": "github",
            "source": ["github"],
            "message": "New commit pushed",
            "description": "Commit message: ${{ github.event.head_commit.message }}",
            "severity": "info",
            "labels": {
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit_sha": "${{ github.sha }}",
              "author": "${{ github.actor }}",
              "commit_message": "${{ github.event.head_commit.message }}",
              "commit_timestamp": "${{ github.event.head_commit.timestamp }}"
            },
            "fingerprint": "push-${{ github.run_id }}"
          }'