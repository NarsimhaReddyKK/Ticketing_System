name: Deployment with KeepHQ Maintenance Window

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Create Maintenance Rule in KeepHQ
        id: create_rule
        run: |
          RESPONSE=$(curl -s -X POST "https://d262zqlbf1m6r4.cloudfront.net/api/backend/maintenance" \
          -H "Content-Type: application/json" \
          -H "X-API-KEY: ${{ secrets.KEEP_API_KEY }}" \
          -d '{
            "name": "Deployment Maintenance Window",
            "description": "Silence alerts during deployment",
            "cel_query": "environment == \"production\"",
            "start_time": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "duration_seconds": 1800,
            "suppress": true,
            "enabled": true,
            "ignore_statuses": [
              "resolved",
              "acknowledged"
            ]
          }')

          echo "API RESPONSE: $RESPONSE"

          RULE_ID=$(echo $RESPONSE | jq -r '.id')
          echo "RULE_ID=$RULE_ID" >> $GITHUB_ENV
          echo "Created maintenance rule: $RULE_ID"

      - name: Simulate Deployment
        run: |
          echo "Starting deployment simulation..."
          sleep 300
          echo "Deployment simulation finished."

      - name: Delete Maintenance Rule
        run: |
          echo "Deleting maintenance rule $RULE_ID"

          curl -X DELETE "https://d262zqlbf1m6r4.cloudfront.net/api/backend/maintenance/$RULE_ID" \
          -H "X-API-KEY: ${{ secrets.KEEP_API_KEY }}"